<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SignalIQ — AI Stock Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e1117; --surface:#161b24; --surface2:#1c2333;
  --border:#252d3d; --border2:#2e3a50;
  --text:#e2e8f0; --text2:#8896aa; --text3:#4a5568;
  --green:#10b981; --red:#ef4444; --amber:#f59e0b; --blue:#3b82f6; --indigo:#6366f1;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --r:12px; --rs:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:80px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes thinking{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}

/* HEADER */
.header{position:sticky;top:0;z-index:50;background:rgba(14,17,23,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:8px}
.brand-icon{width:28px;height:28px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center}
.brand-icon svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round}
.brand-name{font-size:17px;font-weight:700;letter-spacing:-.3px}
.brand-name span{color:var(--green)}
.mkt-status{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--text2)}
.sdot{width:6px;height:6px;border-radius:50%}
.sdot.open{background:var(--green);animation:pulse 2s infinite}
.sdot.closed{background:var(--red)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(14,17,23,.96);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);font-family:var(--font);font-size:10px;font-weight:500;transition:color .2s}
.nav-item.active{color:var(--green)}
.nav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* MAIN */
.main{max-width:480px;margin:0 auto;padding:16px}
.tab-panel{display:none;animation:fadeUp .3s ease both}
.tab-panel.active{display:block}
.section-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}

/* MARKET STRIP */
.mkt-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none}
.mkt-strip::-webkit-scrollbar{display:none}
.mkt-chip{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;min-width:88px}
.mkt-chip .ml{font-size:10px;color:var(--text3);font-weight:500;margin-bottom:4px}
.mkt-chip .mv{font-size:14px;font-weight:700;font-family:var(--mono)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px}
.search-box{display:flex;gap:8px}
.search-input{flex:1;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--rs);padding:13px 14px;color:var(--text);font-size:15px;font-family:var(--mono);font-weight:500;outline:none;-webkit-appearance:none;transition:border-color .2s;width:100%}
.search-input::placeholder{color:var(--text3);font-family:var(--font);font-weight:400;font-size:14px}
.search-input:focus{border-color:var(--green)}
.btn-primary{background:var(--green);color:#fff;border:none;border-radius:var(--rs);padding:13px 16px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;white-space:nowrap;transition:background .2s;flex-shrink:0}
.btn-primary:active{background:#0da271}
.btn-primary:disabled{background:var(--border2);cursor:not-allowed}

/* AUTOCOMPLETE */
.autocomplete{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:slideDown .15s ease;overflow:hidden;display:none}
.autocomplete.show{display:block}
.ac-item{padding:11px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);transition:background .15s}
.ac-item:last-child{border-bottom:none}
.ac-item:active{background:var(--surface)}
.ac-ticker{font-size:14px;font-weight:700;font-family:var(--mono);color:var(--text)}
.ac-name{font-size:12px;color:var(--text3);margin-top:1px}

/* TICKER MANAGEMENT */
.ticker-section{margin-top:12px}
.ticker-section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ticker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ticker-chip{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;font-family:var(--mono);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:2px}
.ticker-chip:active,.ticker-chip.active{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:var(--green)}
.ticker-chip .rx{display:none;font-size:10px;color:var(--red);margin-left:2px;font-family:var(--font);font-weight:700}
.edit-mode .ticker-chip .rx{display:inline}
.edit-mode .ticker-chip{border-color:var(--border2);color:var(--text3)}
.btn-edit{font-size:11px;font-weight:600;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:4px 10px;cursor:pointer;font-family:var(--font)}
.btn-edit.active{color:var(--amber);border-color:rgba(245,158,11,.4)}
.add-ticker-row{display:flex;gap:6px;margin-top:10px}
.add-ticker-input{flex:1;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--rs);padding:9px 12px;color:var(--text);font-size:14px;font-family:var(--mono);font-weight:600;outline:none;-webkit-appearance:none;transition:border-color .2s}
.add-ticker-input::placeholder{color:var(--text3);font-family:var(--font);font-weight:400;font-size:13px}
.add-ticker-input:focus{border-color:var(--green)}
.btn-add{background:rgba(16,185,129,.12);border:1.5px solid rgba(16,185,129,.3);color:var(--green);border-radius:var(--rs);padding:9px 14px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;white-space:nowrap}

/* TRENDING */
.trend-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s;animation:fadeUp .3s ease both}
.trend-card:active{background:var(--surface2)}

/* SIGNAL BADGE */
.sig{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.2px}
.sig.BUY{background:rgba(16,185,129,.15);color:var(--green)}
.sig.SELL{background:rgba(239,68,68,.15);color:var(--red)}
.sig.HOLD{background:rgba(245,158,11,.15);color:var(--amber)}
.sig.lg{font-size:15px;padding:9px 20px;border-radius:24px}

/* SIGNAL HERO */
.signal-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 16px;margin-bottom:12px}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.conf-block{display:flex;flex-direction:column;align-items:flex-end}
.conf-label{font-size:10px;color:var(--text3);font-weight:500;margin-bottom:4px;text-align:right}
.conf-value{font-size:26px;font-weight:800;font-family:var(--mono);letter-spacing:-1px}
.hero-meta{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.meta-chip{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-weight:500}
.chart-wrap{background:var(--surface2);border-radius:var(--rs);padding:12px 8px;margin-top:14px}
.live-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--green);background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:4px;padding:2px 7px;font-weight:600}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}

/* AI ANALYSIS BLOCK */
.ai-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px}
.ai-block-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.ai-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--indigo),var(--blue));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-title{font-size:13px;font-weight:700;color:var(--text)}
.ai-subtitle{font-size:11px;color:var(--text3);margin-top:1px}
.ai-reasoning{font-size:13px;color:var(--text2);line-height:1.7;background:var(--surface2);border-radius:var(--rs);padding:14px;border-left:3px solid var(--indigo)}
.ai-factors{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.ai-factor{background:var(--surface2);border-radius:var(--rs);padding:10px 12px}
.af-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.af-value{font-size:13px;font-weight:700;font-family:var(--mono)}
.af-note{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4}
.ai-timeframe{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.tf-chip{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:4px 10px}
.tf-chip.active{color:var(--green);border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.08)}

/* THINKING LOADER */
.thinking-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:16px}
.thinking-dots{display:flex;gap:6px}
.thinking-dot{width:8px;height:8px;border-radius:50%;background:var(--indigo);animation:thinking 1.2s infinite}
.thinking-dot:nth-child(2){animation-delay:.2s}
.thinking-dot:nth-child(3){animation-delay:.4s}
.thinking-steps{font-size:12px;color:var(--text3);text-align:center;line-height:1.8}
.thinking-step{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.ts-icon{font-size:14px}

/* GAUGES */
.gauge-row{margin-bottom:10px}
.gauge-hdr{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.gauge-hdr .gl{color:var(--text2);font-weight:500}
.gauge-hdr .gv{font-weight:600;font-family:var(--mono)}
.gauge-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.gauge-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* STAT ROWS */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.sl{font-size:13px;color:var(--text2);font-weight:400}
.sv{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--text)}

/* OUTPUT GRID */
.output-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.output-tile{background:var(--surface2);border-radius:var(--rs);padding:12px}
.ot-label{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.ot-value{font-size:14px;font-weight:700;font-family:var(--mono)}

/* ACTIONS */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.action-btn{border:1.5px solid var(--border2);border-radius:var(--rs);padding:12px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;background:var(--surface);color:var(--text2);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.action-btn:active{background:var(--surface2)}
.action-btn.primary{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--green)}
.action-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* RISK */
.risk{font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px}
.risk-LOW{color:var(--green);background:rgba(16,185,129,.1)}
.risk-MEDIUM{color:var(--amber);background:rgba(245,158,11,.1)}
.risk-HIGH{color:var(--red);background:rgba(239,68,68,.1)}

/* PORTFOLIO */
.pl-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 16px;margin-bottom:12px;text-align:center}
.pl-label{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:6px}
.pl-value{font-size:32px;font-weight:800;font-family:var(--mono);letter-spacing:-1px}
.pos-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.pos-row:last-child{border-bottom:none}
.pos-ticker{font-size:15px;font-weight:700}
.pos-detail{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.pos-pl{font-size:15px;font-weight:700;font-family:var(--mono)}
.btn-remove{font-size:11px;color:var(--text3);background:none;border:1px solid var(--border);border-radius:5px;padding:3px 8px;cursor:pointer;font-family:var(--font);margin-top:4px}

/* WATCHLIST */
.watch-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer}
.watch-row:last-child{border-bottom:none}
.wr-ticker{font-size:15px;font-weight:700}
.wr-name{font-size:11px;color:var(--text3);margin-top:2px}
.wr-change{font-size:13px;font-weight:600;font-family:var(--mono);margin-top:4px}
.btn-x{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px 8px;line-height:1}

/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px}
.spin-ring{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
.loader-text{font-size:13px;color:var(--text3)}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:10px 18px;font-size:13px;font-weight:500;color:var(--text);z-index:200;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* DISCLAIMER */
.disclaimer{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:var(--rs);padding:10px 12px;font-size:11px;color:var(--text3);line-height:1.6;margin-bottom:16px}
.disclaimer strong{color:var(--amber)}

/* EMPTY */
.empty{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px}
.empty-icon{font-size:28px;margin-bottom:8px}

/* DIVIDER */
.data-stamp{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);margin-bottom:14px}
.data-stamp svg{width:13px;height:13px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round}

@media(max-width:360px){
  .output-grid{grid-template-columns:1fr}
  .ticker-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<header class="header">
  <div class="brand">
    <div class="brand-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <span class="brand-name">Signal<span>IQ</span></span>
  </div>
  <div class="mkt-status" id="mkt-hdr"></div>
</header>

<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('dashboard')" id="nav-dashboard">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Dashboard
  </button>
  <button class="nav-item" onclick="switchTab('signal')" id="nav-signal">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Signal
  </button>
  <button class="nav-item" onclick="switchTab('portfolio')" id="nav-portfolio">
    <svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
    Portfolio
  </button>
  <button class="nav-item" onclick="switchTab('watchlist')" id="nav-watchlist">
    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    Watchlist
  </button>
</nav>

<div class="toast" id="toast"></div>

<main class="main">

<!-- DASHBOARD -->
<div class="tab-panel active" id="tab-dashboard">
  <div class="disclaimer"><strong>Educational Demo Only.</strong> Real prices via Finnhub. AI analysis via Claude. Not financial advice — always do your own research.</div>

  <div class="section-label">Market Overview</div>
  <div class="mkt-strip">
    <div class="mkt-chip"><div class="ml">S&P 500</div><div class="mv" id="mkt-spy">—</div></div>
    <div class="mkt-chip"><div class="ml">NASDAQ</div><div class="mv" id="mkt-qqq">—</div></div>
    <div class="mkt-chip"><div class="ml">DOW</div><div class="mv" id="mkt-dia">—</div></div>
    <div class="mkt-chip"><div class="ml">VIX</div><div class="mv" id="mkt-vix" style="color:var(--amber)">—</div></div>
    <div class="mkt-chip"><div class="ml">10Y Yield</div><div class="mv" style="color:var(--red)">4.28%</div></div>
  </div>

  <div class="card">
    <div class="section-label">Search &amp; Analyze</div>
    <div class="search-wrap">
      <div class="search-box">
        <input class="search-input" id="search-input" placeholder="Ticker or company name…"
          autocomplete="off" autocorrect="off" spellcheck="false"
          oninput="onSearchInput(this.value)" onkeydown="onSearchKey(event)">
        <button class="btn-primary" id="search-btn" onclick="analyzeFromSearch()">Analyze</button>
      </div>
      <div class="autocomplete" id="autocomplete"></div>
    </div>
    <div class="ticker-section">
      <div class="ticker-section-header">
        <span class="section-label" style="margin-bottom:0">Your Stocks</span>
        <button class="btn-edit" id="edit-btn" onclick="toggleEditMode()">Edit</button>
      </div>
      <div class="ticker-grid" id="ticker-grid"></div>
      <div class="add-ticker-row" id="add-ticker-row" style="display:none">
        <input class="add-ticker-input" id="add-ticker-input" placeholder="Add ticker (e.g. ORCL)"
          maxlength="6" autocorrect="off" spellcheck="false"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomTicker();}">
        <button class="btn-add" onclick="addCustomTicker()">+ Add</button>
      </div>
    </div>
  </div>

  <div class="section-label">Trending Signals</div>
  <div id="trending-list"><div class="loader" style="padding:30px"><div class="spin-ring"></div></div></div>
</div>

<!-- SIGNAL -->
<div class="tab-panel" id="tab-signal">
  <div class="card" style="padding:12px;margin-bottom:12px">
    <div class="search-wrap">
      <div class="search-box">
        <input class="search-input" id="signal-search-input" placeholder="Search ticker or company…"
          autocomplete="off" autocorrect="off" spellcheck="false"
          oninput="onSignalSearchInput(this.value)" onkeydown="onSignalSearchKey(event)"
          style="font-size:14px;padding:10px 12px">
        <button class="btn-primary" onclick="analyzeFromSignalSearch()" style="padding:10px 14px;font-size:13px">Go</button>
      </div>
      <div class="autocomplete" id="signal-autocomplete"></div>
    </div>

function isDST(d){
  const j=new Date(d.getFullYear(),0,1).getTimezoneOffset();
  const u=new Date(d.getFullYear(),6,1).getTimezoneOffset();
  return Math.max(j,u)!==d.getTimezoneOffset();
}
function getMarketInfo(){
  const now=new Date();
  const off=isDST(now)?-4:-5;
  const est=new Date(now.getTime()+(now.getTimezoneOffset()+off*60)*60000);
  const h=est.getHours(),m=est.getMinutes(),day=est.getDay();
  const wknd=day===0||day===6;
  const preOpen=!wknd&&(h<9||(h===9&&m<30));
  const isOpen=!wknd&&!preOpen&&h<16;
  const hh=String(h).padStart(2,"0"),mm=String(m).padStart(2,"0");
  return{isOpen,hh,mm};
}

  const{isOpen,hh,mm}=getMarketInfo();

function calcRSI(closes,period=14){
  if(closes.length<period+1)return null;
  let gains=0,losses=0;
  for(let i=closes.length-period;i<closes.length;i++){
    const diff=closes[i]-closes[i-1];
    if(diff>0)gains+=diff; else losses+=Math.abs(diff);
  }
  const avgG=gains/period,avgL=losses/period;
  if(avgL===0)return 100;
  const rs=avgG/avgL;
  return +(100-(100/(1+rs))).toFixed(1);
}

function calcSMA(closes,period){
  if(closes.length<period)return null;
  const slice=closes.slice(-period);
  return +(slice.reduce((a,b)=>a+b,0)/period).toFixed(2);
}

function calcMACD(closes){
  if(closes.length<26)return{macd:null,signal:null};
  const ema=(arr,p)=>{
    const k=2/(p+1);
    let e=arr[0];
    for(let i=1;i<arr.length;i++)e=arr[i]*k+e*(1-k);
    return e;
  };
  const ema12=ema(closes.slice(-26),12);
  const ema26=ema(closes.slice(-26),26);
  const macd=+(ema12-ema26).toFixed(3);
  return{macd};
}

function calcBollinger(closes,period=20){
  if(closes.length<period)return{upper:null,lower:null,mid:null};
  const slice=closes.slice(-period);
  const mid=slice.reduce((a,b)=>a+b,0)/period;
  const variance=slice.reduce((a,b)=>a+(b-mid)**2,0)/period;
  const std=Math.sqrt(variance);
  return{upper:+(mid+2*std).toFixed(2),lower:+(mid-2*std).toFixed(2),mid:+mid.toFixed(2)};
}

function lineChart(closes,period=60){
  if(!closes||closes.length<2)return`<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">Chart data loading...</div>`;
  const sl=closes.slice(-period);
  const mn=Math.min(...sl),mx=Math.max(...sl),rng=mx-mn||1;
  const W=340,H=80,n=sl.length;
  const pts=sl.map((v,i)=>`${(i/(n-1))*(W-4)+2},${H-((v-mn)/rng)*(H-4)-2}`).join(" ");
  const isUp=sl[sl.length-1]>=sl[0];
  const col=isUp?"#10b981":"#ef4444";
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:80px;display:block">
    <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".3"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    ${[1,2,3].map(i=>`<line x1="0" y1="${H*i/4}" x2="${W}" y2="${H*i/4}" stroke="#1c2333" stroke-width="1"/>`).join("")}
    <polyline fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" points="${pts}"/>
    <text x="4" y="12" font-size="9" fill="${col}" font-family="DM Mono">${sl.length}d</text>
  </svg>`;
}

function sparkline(up){
  const pts=Array.from({length:16},()=>50+(Math.random()-.5)*20);
  const mn=Math.min(...pts),mx=Math.max(...pts);
  const W=60,H=24;
  const coords=pts.map((v,i)=>`${(i/(pts.length-1))*W},${H-((v-mn)/(mx-mn||1))*H}`).join(" ");
  return`<svg width="${W}" height="${H}" style="display:block;flex-shrink:0"><polyline fill="none" stroke="${up?"#10b981":"#ef4444"}" stroke-width="1.5" stroke-linejoin="round" points="${coords}"/></svg>`;
}

function toggleEditMode(){
  state.editMode=!state.editMode;
  const btn=document.getElementById("edit-btn");
  const row=document.getElementById("add-ticker-row");
  btn.textContent=state.editMode?"Done":"Edit";
  btn.classList.toggle("active",state.editMode);
  row.style.display=state.editMode?"flex":"none";
  renderTickerGrid();
}
function addCustomTicker(){
  const inp=document.getElementById("add-ticker-input");
  const t=inp.value.trim().toUpperCase();inp.value="";
  if(!t){toast("Enter a ticker symbol");return;}
  if(state.stocks.includes(t)){toast(`${t} already in your list`);return;}
  if(!DB[t])DB[t]={name:t,aliases:[t.toLowerCase()],sector:"Custom",base:100};
  state.stocks.push(t);saveState();renderTickerGrid();renderSignalTickerGrid();
  toast(`${t} added ✓`);
}
function removeFromStocks(t){
  state.stocks=state.stocks.filter(s=>s!==t);saveState();
  renderTickerGrid();renderSignalTickerGrid();toast(`${t} removed`);
}
function renderTickerGrid(){
  const grid=document.getElementById("ticker-grid");
  if(!grid)return;
  grid.className="ticker-grid"+(state.editMode?" edit-mode":"");
  grid.innerHTML=state.stocks.map(t=>`
    <div class="ticker-chip ${t===state.ticker&&!state.editMode?"active":""}"
      onclick="${state.editMode?`removeFromStocks('${t}')`:`goSignal('${t}')`}">
      ${t}${state.editMode?`<span class="rx">✕</span>`:""}
    </div>`).join("");
}
function renderSignalTickerGrid(){
  const grid=document.getElementById("signal-ticker-grid");
  if(!grid)return;
  grid.innerHTML=state.stocks.map(t=>
    `<div class="ticker-chip ${t===state.ticker?"active":""}" onclick="renderSignal('${t}')">${t}</div>`
  ).join("");
}

async function renderPortfolio(){
  const pl=document.getElementById("positions-list");
  const plv=document.getElementById("total-pl");
  if(!state.portfolio.length){
    pl.innerHTML=`<div class="empty"><div class="empty-icon">📂</div>No positions yet.<br>Use Paper Trade on the Signal tab.</div>`;
    plv.textContent="$0.00";plv.style.color="var(--text2)";return;
  }
  pl.innerHTML=`<div class="loader" style="padding:20px"><div class="spin-ring"></div></div>`;
  const quotes=await Promise.all(state.portfolio.map(p=>fetchQuote(p.ticker)));
  let total=0;
  pl.innerHTML=state.portfolio.map((p,i)=>{
    const q=quotes[i];
    const cur=q?q.price:p.avg;
    const pnl=+((cur-p.avg)*p.shares).toFixed(2);
    total+=pnl;
    return`<div class="pos-row">
      <div><div class="pos-ticker">${p.ticker}</div><div class="pos-detail">${p.shares} sh · avg $${p.avg.toFixed(2)} · now $${cur}</div></div>
      <div style="text-align:right">
        <div class="pos-pl" style="color:${pnl>=0?"var(--green)":"var(--red)"}">${pnl>=0?"+":""}$${pnl.toFixed(2)}</div>
        <button class="btn-remove" onclick="removePos(${i})">Remove</button>
      </div>
    </div>`;
  }).join("");
  total=+total.toFixed(2);
  plv.textContent=`${total>=0?"+":""}$${total.toFixed(2)}`;
  plv.style.color=total>=0?"var(--green)":"var(--red)";
  document.getElementById("perf-list").innerHTML=[
    ["Win Rate","67%","var(--green)"],
    ["Avg Return","+4.2%","var(--green)"],
    ["Max Drawdown","−8.4%","var(--red)"],
    ["Sharpe Ratio","1.82","var(--blue)"],
    ["Open Positions",state.portfolio.length,""],
    ["Active Alerts",state.alerts.length,"var(--amber)"],
  ].map(([l,v,c])=>statRow(l,v,c)).join("");
}

function switchTab(tab){
  state.tab=tab;
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  document.getElementById("nav-"+tab).classList.add("active");
  document.querySelectorAll(".autocomplete").forEach(a=>a.classList.remove("show"));
  if(tab==="portfolio")renderPortfolio();
  if(tab==="watchlist")renderWatchlist();
  if(tab==="signal")renderSignal(state.ticker);
  if(tab==="dashboard")renderDashboard();
}
function goSignal(ticker){state.ticker=ticker;switchTab("signal");}
function addWatch(t){
  if(!state.watchlist.includes(t)){state.watchlist.push(t);saveState();toast(`${t} added to watchlist ✓`);}
  else toast(`${t} already in watchlist`);
}
function removeWatch(i){state.watchlist.splice(i,1);saveState();renderWatchlist();}
function paperTrade(ticker,price){
  state.portfolio.push({ticker,shares:1,avg:price});saveState();
  toast(`Paper trade: 1 share of ${ticker} @ $${price} ✓`);
}
function removePos(i){state.portfolio.splice(i,1);saveState();renderPortfolio();}
function setAlert(ticker){
  if(!state.alerts.includes(ticker))state.alerts.push(ticker);saveState();
  toast(`Alert set for ${ticker} ✓`);
}
function addToList(t){
  if(state.stocks.includes(t)){toast(`${t} already in your list`);return;}
  if(!DB[t])DB[t]={name:t,aliases:[t.toLowerCase()],sector:"Custom",base:100};
  state.stocks.push(t);saveState();renderTickerGrid();renderSignalTickerGrid();
  toast(`${t} added to your stock list ✓`);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
loadState();
renderMarketStatus();
setInterval(renderMarketStatus,30000);
renderDashboard();
renderSignal("NVDA");
</script>
</body>
